{{- if eq .Values.networking.type "istio" -}}
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: {{ include "focusing-manager.fullname" . }}
  labels:
    {{- include "focusing-manager.labels" . | nindent 4 }}
spec:
  hosts:
    {{- toYaml .Values.networking.istio.hosts | nindent 4 }}
  gateways:
    {{- toYaml .Values.networking.istio.gateways | nindent 4 }}
  http:
    - match:
        - uri:
            prefix: {{ .Values.networking.istio.pathPrefix }}
      {{- if .Values.networking.istio.rewrite.enabled }}
      rewrite:
        uri: {{ .Values.networking.istio.rewrite.uri | quote }}
      {{- end }}
      route:
        - destination:
            host: {{ include "focusing-manager.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local
            port:
              number: {{ .Values.service.port }}
      {{- if .Values.networking.istio.corsPolicy.enabled }}
      corsPolicy:
        allowMethods:
          {{- toYaml .Values.networking.istio.corsPolicy.allowMethods | nindent 10 }}
        allowOrigins:
          {{- toYaml .Values.networking.istio.corsPolicy.allowOrigins | nindent 10 }}
        allowHeaders:
          {{- toYaml .Values.networking.istio.corsPolicy.allowHeaders | nindent 10 }}
      {{- end }}
{{- end }}
